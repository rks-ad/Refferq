services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: refferq-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:c6o8nqkdmgpngvla@nextra-money-apps-nextramoneydata-20d36c:5432/postgres
      - JWT_SECRET=4a9f6d2b8c5e1a3f7d90b2c4e6f8a0b3c5d7e9f1a2b3c4d5e6f7a8b9c0d1e2f3
      - RESEND_API_KEY=re_6WPdwsKR_K3jdzMwfcEsV8igz3rLLfMju
      - RESEND_FROM_EMAIL=notify@mails.nextra.money
      - ADMIN_EMAILS=iam@rks.ad
      - NEXT_PUBLIC_APP_URL=partners.nextra.money
    depends_on:
      db:
        condition: service_healthy
    networks:
      - refferq-network

  db:
    image: postgres:16-alpine
    container_name: refferq-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=c6o8nqkdmgpngvla
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U refferq"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - refferq-network

volumes:
  postgres_data:

networks:
  refferq-network:
    driver: bridge
